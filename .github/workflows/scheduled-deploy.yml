name: Scheduled Deploy to Dev

on:
  workflow_dispatch:  # 手动触发：GitHub Actions 页面点击 Run workflow
  schedule:
    - cron: "0 12 * * *"  # 每天 12:00 UTC = 20:00 北京时间

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - run: npm install -g pnpm && pnpm install --no-frozen-lockfile
        shell: bash

      - name: Export Feishu data to JSON
        run: python3 scripts/export_feishu_to_json.py
        shell: bash
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - run: pnpm run build
        shell: bash

      - name: Create PR with data updates
        run: |
          BRANCH_NAME="chore/feishu-data-$(date '+%Y%m%d-%H%M%S')"
          COMMIT_DATE=$(date '+%Y-%m-%d %H:%M')
          PR_TITLE="chore: sync Feishu data $(date '+%Y-%m-%d')"
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git commit -m "chore: sync Feishu data at $COMMIT_DATE" || exit 0
          git push origin "$BRANCH_NAME"
          gh pr create --base main --head "$BRANCH_NAME" --title "$PR_TITLE" --body "自动同步飞书数据更新"
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}