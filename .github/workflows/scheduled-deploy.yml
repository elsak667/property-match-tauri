name: Scheduled Deploy to Dev

on:
  workflow_dispatch:  # 手动触发：GitHub Actions 页面点击 Run workflow
  schedule:
    - cron: "0 9 * * *"  # 每天 9:00 UTC = 17:00 北京时间

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: dev

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - run: npm install -g pnpm && pnpm install --no-frozen-lockfile
        shell: bash

      - name: Export Feishu data to JSON
        run: python3 scripts/export_feishu_to_json.py
        shell: bash
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - run: pnpm run build
        shell: bash

      - name: Create PR with data updates
        run: |
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b chore/feishu-data-$(date '+%Y%m%d-%H%M%S')
          git commit -m "chore: sync Feishu data at $(date '+%Y-%m-%d %H:%M')" || exit 0
          git push origin chore/feishu-data-$(date '+%Y%m%d-%H%M%S')
          gh pr create --base dev --head chore/feishu-data-$(date '+%Y%m%d-%H%M%S') --title "chore: sync Feishu data $(date '+%Y-%m-%d')" --body "自动同步飞书数据更新"
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}