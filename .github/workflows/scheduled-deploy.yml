name: Scheduled Deploy to Dev

on:
  workflow_dispatch:  # 手动触发：GitHub Actions 页面点击 Run workflow
  schedule:
    - cron: "0 9 * * *"  # 每天 9:00 UTC = 17:00 北京时间

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
        shell: bash

      - run: pnpm run build
        shell: bash

      - name: Push to dev
        run: |
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "auto deploy at $(date '+%Y-%m-%d %H:%M')" || exit 0
          git push origin dev
        shell: bash