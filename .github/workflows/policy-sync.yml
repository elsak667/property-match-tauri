name: Pudong Policy Sync

on:
  workflow_dispatch:
    inputs:
      full_sync:
        description: "跑完整流程（需要 pudong-token，否则只跑 Step 4）"
        required: false
        default: "false"
        type: boolean
      pudong_token:
        description: "浦东 API Bearer Token（full_sync=true 时需要）"
        required: false
        type: string

  schedule:
    - cron: "0 22 * * *"  # 每天 22:00 北京时间 = 14:00 UTC
      branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl playwright
        shell: bash

      - name: Install playwright browsers
        run: playwright install chromium --with-deps
        shell: bash

      - name: Run Step 4 only (scheduled or no pudong-token)
        if: github.event.inputs.pudong_token == '' || github.event.inputs.pudong_token == null
        run: python3 scripts/pudong_fetch_and_tag.py --step4-only
        shell: bash
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - name: Run full sync (manual with pudong-token)
        if: github.event.inputs.full_sync == 'true' && github.event.inputs.pudong_token != ''
        run: python3 scripts/pudong_fetch_and_tag.py --pudong-token "${{ github.event.inputs.pudong_token }}"
        shell: bash
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - name: Export updated data to JSON
        run: |
          python3 scripts/export_feishu_to_json.py
          git add public/data/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || git commit -m "chore: update static data JSON"
          git push origin main
        shell: bash
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}