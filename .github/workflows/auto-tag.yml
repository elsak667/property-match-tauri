name: Auto Tag on Main Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto Tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          DATE=$(date +%Y-%m-%d)
          PREFIX="v${DATE}"

          # Count existing tags for today
          TODAY_COUNT=$(git tag -l "${PREFIX}-*" 2>/dev/null | wc -l | tr -d ' ')
          NEXT_NUM=$((TODAY_COUNT + 1))

          TAG="${PREFIX}-${NEXT_NUM}"
          git tag "$TAG"
          git push origin "$TAG"

          echo "✅ Tagged: $TAG"
