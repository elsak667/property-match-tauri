name: Pudong Policy Fetch

on:
  push:
    paths:
      - 'data/pudong_policies.json'
  workflow_dispatch:
    inputs:
      full_sync:
        description: "完整处理（process+sync）"
        required: false
        default: "true"
        type: boolean

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run process script
        if: github.event.inputs.full_sync != 'false'
        run: python3 scripts/pudong_process.py

      - name: Run feishu sync
        if: github.event.inputs.full_sync != 'false'
        run: python3 scripts/pudong_sync.py
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_SHEET_TOKEN: ${{ secrets.FEISHU_SHEET_TOKEN }}

      - name: Upload artifacts
        if: github.event.inputs.full_sync != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: pudong-policies-${{ github.run_number }}
          path: |
            data/pudong_policies.json
            /tmp/pudong_policies_full.xlsx
          retention-days: 7
