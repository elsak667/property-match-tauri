name: CI

on:
  pull_request:
    branches: [dev, main, 'chore/*']

jobs:
  ci:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check & Build
        run: npm run build
        env:
          VITE_USE_WORKERS: "true"
