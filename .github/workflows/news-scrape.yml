name: 张通社新闻抓取

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"  # 每2小时跑一次

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl playwright python-dotenv
        shell: bash

      - name: Install playwright browsers
        run: playwright install chromium --with-deps
        shell: bash

      - name: Run scrape
        run: python3 scripts/scrape_zhangtongshe.py
        shell: bash
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          NEWS_SHEET_TOKEN: ${{ secrets.NEWS_SHEET_TOKEN }}
          NEWS_SHEET_ID: ${{ secrets.NEWS_SHEET_ID }}

      - name: Export Feishu data to JSON
        run: python3 scripts/export_feishu_to_json.py
        shell: bash
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - name: Commit updated news.json
        run: |
          git add public/data/news.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || git commit -m "chore: update news.json from Feishu"
          git push origin main
        shell: bash
